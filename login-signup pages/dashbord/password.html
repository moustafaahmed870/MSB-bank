<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" href="favicon.ico" type="image/x-icon">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://kit.fontawesome.com/91081d7dd9.js" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="/login-signup pages/dashbord/css/password.css">
    <script type="module" src="/login-signup pages/dashbord/js/password.js"></script>
    <title>Password Account</title>
    <link rel="icon" href="https://i.ibb.co/LhY9KjRv/MSB.png">
</head>
<body> 
    <div id="w-div">
    <div id="loader">
    <div class="loader-ring"></div>
    </div>
        <canvas id="canvas"></canvas>
    <div  id="hero" class="container">
    <div class="bord">
        <h1><i class="fa-solid fa-building-columns"></i></h1>
        <h2>Enter Your Password </h2>
        <div class="input-group">
            <input type="password" id="password1" name="password" required>
            <label>New Password</label>
            <div id="passStrength" class="strength">Strength: —</div>
        </div>
        <div class="input-group">
            <input type="password" id="password2" name="password" required>
            <label>Confirm New Password</label>
        </div>
        <p id="errorMessage" style="color: red; margin: 10px 0; display: none;"></p>
        <button type="submit" class="submit-btn" id="submitBtn">Submit</button>
    </div>
    </div>
    </div>
</body>
</html>
