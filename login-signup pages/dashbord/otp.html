<!DOCTYPE html>
<html lang="en">
<head>
<link rel="icon" href="favicon.ico" type="image/x-icon">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://kit.fontawesome.com/91081d7dd9.js" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="/login-signup pages/dashbord/css/otp.css">
    <script type="module" src="/login-signup pages/dashbord/js/otp.js"></script>
    <title>Forget Password</title>
    <link rel="icon" href="https://i.ibb.co/LhY9KjRv/MSB.png">
<body> 
    <div id="w-div">
        <div id="loader">
            <div class="loader-ring"></div>
        </div>
        <canvas id="canvas"></canvas>
        <div id="hero" class="container">
            <div class="bord">
                <h1><i class="fa-solid fa-building-columns"></i></h1>
                <h2>Enter OTP Code</h2>
                <p>We've sent a verification code to your email <span>Please enter the 6-digit code below to verify your identity.</span></p>
                <div class="otp-container">
                    <input type="text" class="otp-input" maxlength="1" pattern="[0-9]" id="otp1">
                    <input type="text" class="otp-input" maxlength="1" pattern="[0-9]" id="otp2">
                    <input type="text" class="otp-input" maxlength="1" pattern="[0-9]" id="otp3">
                    <input type="text" class="otp-input" maxlength="1" pattern="[0-9]" id="otp4">
                    <input type="text" class="otp-input" maxlength="1" pattern="[0-9]" id="otp5">
                    <input type="text" class="otp-input" maxlength="1" pattern="[0-9]" id="otp6">
                </div>
                <!-- ✅ إزالة الـ <a> واستخدام زر عادي -->
                <button type="button" class="submit-btn" id="submitBtn">Verify OTP</button>
            </div>
        </div>
    </div>
</body>
</html>
