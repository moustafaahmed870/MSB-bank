<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>التحليلات - MSB Bank</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Cairo', sans-serif; background: #081b29; }
        .admin-container { display: flex; min-height: 100vh; }
        .sidebar {
            width: 280px;
            background: linear-gradient(180deg, #0a2438 0%, #081b29 100%);
            border-left: 1px solid rgba(0, 238, 255, 0.2);
            position: fixed;
            right: 0;
            top: 0;
            height: 100vh;
            overflow-y: auto;
            transition: all 0.3s ease;
            z-index: 100;
        }
        .sidebar-header { padding: 25px 20px; text-align: center; border-bottom: 1px solid rgba(0, 238, 255, 0.2); }
        .sidebar-header img { width: 70px; margin-bottom: 10px; }
        .sidebar-header h3 { color: #0ef; font-size: 20px; }
        .sidebar-header p { color: #a0d2db; font-size: 12px; opacity: 0.7; }
        .sidebar-menu { padding: 20px 0; }
        .menu-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 25px;
            color: #a0d2db;
            text-decoration: none;
            transition: all 0.3s ease;
            border-right: 3px solid transparent;
        }
        .menu-item i { width: 22px; font-size: 18px; }
        .menu-item:hover { background: rgba(0, 238, 255, 0.1); color: #0ef; }
        .menu-item.active { background: rgba(0, 238, 255, 0.15); border-right-color: #0ef; color: #0ef; }
        .main-content { flex: 1; margin-right: 280px; padding: 20px; }
        .top-header {
            background: linear-gradient(135deg, rgba(10, 36, 56, 0.95) 0%, rgba(8, 27, 41, 0.98) 100%);
            border-radius: 15px;
            padding: 15px 25px;
            margin-bottom: 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid rgba(0, 238, 255, 0.2);
        }
        .page-title { color: #0ef; font-size: 24px; font-weight: 600; }
        .admin-info { display: flex; align-items: center; gap: 15px; }
        .admin-name { color: #a0d2db; }
        .logout-btn {
            background: rgba(239, 68, 68, 0.2);
            border: 1px solid #ef4444;
            color: #ef4444;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .logout-btn:hover { background: #ef4444; color: white; }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: linear-gradient(135deg, rgba(10, 36, 56, 0.95) 0%, rgba(8, 27, 41, 0.98) 100%);
            border-radius: 15px;
            padding: 20px;
            border: 1px solid rgba(0, 238, 255, 0.2);
            transition: all 0.3s ease;
        }
        .stat-card:hover { transform: translateY(-5px); border-color: #0ef; }
        .stat-icon { width: 50px; height: 50px; background: rgba(0, 238, 255, 0.15); border-radius: 12px; display: flex; align-items: center; justify-content: center; margin-bottom: 15px; }
        .stat-icon i { font-size: 24px; color: #0ef; }
        .stat-value { font-size: 28px; font-weight: 700; color: #fff; margin-bottom: 5px; }
        .stat-label { color: #a0d2db; font-size: 14px; }
        .charts-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }
        .card {
            background: linear-gradient(135deg, rgba(10, 36, 56, 0.95) 0%, rgba(8, 27, 41, 0.98) 100%);
            border-radius: 15px;
            border: 1px solid rgba(0, 238, 255, 0.2);
            overflow: hidden;
        }
        .card-header {
            padding: 18px 20px;
            border-bottom: 1px solid rgba(0, 238, 255, 0.2);
        }
        .card-header h3 { color: #0ef; font-size: 18px; }
        .card-body { padding: 20px; }
        .chart-container { position: relative; height: 250px; }
        .activity-list { list-style: none; }
        .activity-item {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 12px 0;
            border-bottom: 1px solid rgba(0, 238, 255, 0.1);
        }
        .activity-icon {
            width: 40px;
            height: 40px;
            background: rgba(0, 238, 255, 0.1);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .activity-icon i { color: #0ef; font-size: 18px; }
        .activity-details { flex: 1; }
        .activity-title { color: #fff; font-weight: 500; margin-bottom: 4px; }
        .activity-time { color: #a0d2db; font-size: 12px; opacity: 0.7; }
        .activity-amount { font-weight: 600; }
        .amount-positive { color: #10b981; }
        .amount-negative { color: #ef4444; }
        .menu-toggle {
            display: none;
            background: rgba(0, 238, 255, 0.2);
            border: none;
            color: #0ef;
            font-size: 24px;
            padding: 10px;
            border-radius: 8px;
            cursor: pointer;
        }
        @media (max-width: 992px) {
            .sidebar { right: -280px; }
            .main-content { margin-right: 0; }
            .sidebar.mobile-open { right: 0; }
            .menu-toggle { display: block; }
            .stats-grid, .charts-grid { grid-template-columns: repeat(2, 1fr); }
        }
        @media (max-width: 576px) {
            .stats-grid, .charts-grid { grid-template-columns: 1fr; }
            .top-header { flex-direction: column; gap: 10px; }
        }
        .loading-spinner { text-align: center; padding: 20px; color: #a0d2db; }
    </style>
</head>
<body>
    <div class="admin-container">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <img src="https://i.ibb.co/LhY9KjRv/MSB.png" alt="MSB Bank">
                <h3>MSB Bank</h3>
                <p>منصة المشرفين</p>
            </div>
            <div class="sidebar-menu">
                <a href="dashboard.html" class="menu-item">
                    <i class="fas fa-tachometer-alt"></i>
                    <span>لوحة التحكم</span>
                </a>
                <a href="users.html" class="menu-item">
                    <i class="fas fa-users"></i>
                    <span>إدارة المستخدمين</span>
                </a>
                <a href="analytics.html" class="menu-item active">
                    <i class="fas fa-chart-line"></i>
                    <span>التحليلات</span>
                </a>
                <a href="settings.html" class="menu-item">
                    <i class="fas fa-cog"></i>
                    <span>إعدادات النظام</span>
                </a>
            </div>
        </aside>

        <main class="main-content">
            <div class="top-header">
                <button class="menu-toggle" id="menuToggle">
                    <i class="fas fa-bars"></i>
                </button>
                <h1 class="page-title">التحليلات والإحصائيات</h1>
                <div class="admin-info">
                    <span class="admin-name" id="adminName">admin@msbbank.com</span>
                    <button class="logout-btn" id="logoutBtn">
                        <i class="fas fa-sign-out-alt"></i> خروج
                    </button>
                </div>
            </div>

            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-icon"><i class="fas fa-dollar-sign"></i></div>
                    <div class="stat-value" id="totalVolume">0</div>
                    <div class="stat-label">إجمالي حجم المعاملات</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon"><i class="fas fa-users"></i></div>
                    <div class="stat-value" id="activeUsers">0</div>
                    <div class="stat-label">المستخدمين النشطين</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon"><i class="fas fa-exchange-alt"></i></div>
                    <div class="stat-value" id="totalTransactions">0</div>
                    <div class="stat-label">إجمالي المعاملات</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon"><i class="fas fa-chart-line"></i></div>
                    <div class="stat-value" id="avgTransaction">0</div>
                    <div class="stat-label">متوسط قيمة المعاملة</div>
                </div>
            </div>

            <div class="charts-grid">
                <div class="card">
                    <div class="card-header">
                        <h3><i class="fas fa-chart-line"></i> المعاملات الشهرية</h3>
                    </div>
                    <div class="card-body">
                        <div class="chart-container">
                            <canvas id="monthlyChart"></canvas>
                        </div>
                    </div>
                </div>
                <div class="card">
                    <div class="card-header">
                        <h3><i class="fas fa-chart-pie"></i> توزيع أنواع الحسابات</h3>
                    </div>
                    <div class="card-body">
                        <div class="chart-container">
                            <canvas id="accountsChart"></canvas>
                        </div>
                    </div>
                </div>
            </div>

            <div class="card">
                <div class="card-header">
                    <h3><i class="fas fa-history"></i> آخر الأنشطة</h3>
                </div>
                <div class="card-body">
                    <div id="activityContainer">
                        <div class="loading-spinner">
                            <i class="fas fa-spinner fa-spin"></i> جاري التحميل...
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="admin-auth.js"></script>
    <script src="admin-api.js"></script>
    <script>
        let monthlyChart, accountsChart;

        async function loadAnalyticsData() {
            try {
                const stats = await AdminAPI.getSystemStats();
                const activities = await AdminAPI.getRecentActivities();
                
                if (stats.success) {
                    updateStats(stats.stats);
                    updateCharts(stats.stats);
                }
                
                if (activities.success) {
                    renderActivities(activities.activities);
                }
                
            } catch (error) {
                console.error('Error loading analytics:', error);
                document.getElementById('activityContainer').innerHTML = `
                    <div class="loading-spinner" style="color: #ef4444;">
                        <i class="fas fa-exclamation-triangle"></i> خطأ في تحميل البيانات
                    </div>
                `;
            }
        }

        function updateStats(stats) {
            // حساب إجمالي حجم المعاملات
            const totalVolume = stats.monthlyTransactions?.reduce((sum, val) => sum + val, 0) || 0;
            document.getElementById('totalVolume').innerHTML = totalVolume.toLocaleString() + ' ج.م';
            document.getElementById('activeUsers').innerHTML = stats.activeUsers || 0;
            document.getElementById('totalTransactions').innerHTML = stats.totalTransactions || 0;
            
            const avgTransaction = stats.totalTransactions > 0 ? Math.round(totalVolume / stats.totalTransactions) : 0;
            document.getElementById('avgTransaction').innerHTML = avgTransaction.toLocaleString() + ' ج.م';
        }

        function updateCharts(stats) {
            const monthlyData = stats.monthlyTransactions || new Array(12).fill(0);
            const months = ['يناير', 'فبراير', 'مارس', 'إبريل', 'مايو', 'يونيو', 
                           'يوليو', 'أغسطس', 'سبتمبر', 'أكتوبر', 'نوفمبر', 'ديسمبر'];
            
            // Monthly Chart
            const monthlyCtx = document.getElementById('monthlyChart').getContext('2d');
            if (monthlyChart) monthlyChart.destroy();
            monthlyChart = new Chart(monthlyCtx, {
                type: 'line',
                data: {
                    labels: months,
                    datasets: [{
                        label: 'حجم المعاملات (ج.م)',
                        data: monthlyData,
                        borderColor: '#0ef',
                        backgroundColor: 'rgba(0, 238, 255, 0.1)',
                        borderWidth: 2,
                        fill: true,
                        tension: 0.4,
                        pointBackgroundColor: '#0ef',
                        pointBorderColor: '#fff',
                        pointRadius: 4
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: true,
                    plugins: { legend: { labels: { color: '#a0d2db' } } },
                    scales: {
                        y: { ticks: { color: '#a0d2db' }, grid: { color: 'rgba(255,255,255,0.1)' } },
                        x: { ticks: { color: '#a0d2db' }, grid: { color: 'rgba(255,255,255,0.1)' } }
                    }
                }
            });
            
            // Accounts Distribution Chart
            const accountsCtx = document.getElementById('accountsChart').getContext('2d');
            if (accountsChart) accountsChart.destroy();
            accountsChart = new Chart(accountsCtx, {
                type: 'doughnut',
                data: {
                    labels: ['حساب جاري', 'حساب توفير', 'حساب استثمار'],
                    datasets: [{
                        data: [stats.currentAccounts || 0, stats.savingsAccounts || 0, stats.investmentAccounts || 0],
                        backgroundColor: ['#0ef', '#10b981', '#f59e0b'],
                        borderWidth: 0,
                        hoverOffset: 10
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: true,
                    plugins: { legend: { position: 'bottom', labels: { color: '#a0d2db' } } }
                }
            });
        }

        function renderActivities(activities) {
            const container = document.getElementById('activityContainer');
            
            if (!activities || activities.length === 0) {
                container.innerHTML = `
                    <div class="loading-spinner">
                        <i class="fas fa-inbox"></i> لا توجد أنشطة
                    </div>
                `;
                return;
            }
            
            container.innerHTML = activities.slice(0, 10).map(activity => {
                let icon = 'bell';
                let title = activity.title || 'نشاط';
                let amountHtml = '';
                
                if (activity.type === 'user_register') icon = 'user-plus';
                else if (activity.type === 'transfer') icon = 'exchange-alt';
                else if (activity.type === 'deposit') icon = 'arrow-down';
                else if (activity.type === 'investment') icon = 'chart-line';
                
                if (activity.amount) {
                    const amountClass = activity.amount > 0 ? 'amount-positive' : 'amount-negative';
                    const amountPrefix = activity.amount > 0 ? '+' : '';
                    amountHtml = `<div class="activity-amount ${amountClass}">${amountPrefix}${Math.abs(activity.amount).toLocaleString()} ج.م</div>`;
                }
                
                return `
                    <div class="activity-item">
                        <div class="activity-icon">
                            <i class="fas fa-${icon}"></i>
                        </div>
                        <div class="activity-details">
                            <div class="activity-title">${title}</div>
                            <div class="activity-time">${activity.detail || ''} • ${formatTimeAgo(activity.time)}</div>
                        </div>
                        ${amountHtml}
                    </div>
                `;
            }).join('');
        }

        function formatTimeAgo(dateStr) {
            if (!dateStr) return '';
            const date = new Date(dateStr);
            const now = new Date();
            const diffMs = now - date;
            const diffMins = Math.floor(diffMs / 60000);
            const diffHours = Math.floor(diffMs / 3600000);
            const diffDays = Math.floor(diffMs / 86400000);
            
            if (diffMins < 1) return 'الآن';
            if (diffMins < 60) return `منذ ${diffMins} دقيقة`;
            if (diffHours < 24) return `منذ ${diffHours} ساعة`;
            if (diffDays < 7) return `منذ ${diffDays} يوم`;
            return date.toLocaleDateString('ar-EG');
        }

        // إعدادات الصفحة
        document.getElementById('menuToggle')?.addEventListener('click', function() {
            document.getElementById('sidebar').classList.toggle('mobile-open');
        });

        document.getElementById('logoutBtn')?.addEventListener('click', function() {
            adminLogout();
        });

        document.getElementById('adminName').textContent = localStorage.getItem('adminEmail') || 'admin@msbbank.com';
        
        // تحميل البيانات
        loadAnalyticsData();
    </script>
</body>
</html>
