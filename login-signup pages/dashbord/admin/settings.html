<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إعدادات النظام - MSB Bank</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* نفس الستايلات */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Cairo', sans-serif; background: #081b29; }
        .admin-container { display: flex; min-height: 100vh; }
        .sidebar {
            width: 280px;
            background: linear-gradient(180deg, #0a2438 0%, #081b29 100%);
            border-left: 1px solid rgba(0, 238, 255, 0.2);
            position: fixed;
            right: 0;
            top: 0;
            height: 100vh;
            overflow-y: auto;
            transition: all 0.3s ease;
            z-index: 100;
        }
        .sidebar-header { padding: 25px 20px; text-align: center; border-bottom: 1px solid rgba(0, 238, 255, 0.2); }
        .sidebar-header img { width: 70px; margin-bottom: 10px; }
        .sidebar-header h3 { color: #0ef; font-size: 20px; }
        .sidebar-header p { color: #a0d2db; font-size: 12px; opacity: 0.7; }
        .sidebar-menu { padding: 20px 0; }
        .menu-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 25px;
            color: #a0d2db;
            text-decoration: none;
            transition: all 0.3s ease;
            border-right: 3px solid transparent;
        }
        .menu-item i { width: 22px; font-size: 18px; }
        .menu-item:hover { background: rgba(0, 238, 255, 0.1); color: #0ef; }
        .menu-item.active { background: rgba(0, 238, 255, 0.15); border-right-color: #0ef; color: #0ef; }
        .main-content { flex: 1; margin-right: 280px; padding: 20px; }
        .top-header {
            background: linear-gradient(135deg, rgba(10, 36, 56, 0.95) 0%, rgba(8, 27, 41, 0.98) 100%);
            border-radius: 15px;
            padding: 15px 25px;
            margin-bottom: 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid rgba(0, 238, 255, 0.2);
        }
        .page-title { color: #0ef; font-size: 24px; font-weight: 600; }
        .admin-info { display: flex; align-items: center; gap: 15px; }
        .admin-name { color: #a0d2db; }
        .logout-btn {
            background: rgba(239, 68, 68, 0.2);
            border: 1px solid #ef4444;
            color: #ef4444;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .logout-btn:hover { background: #ef4444; color: white; }
        .settings-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
        }
        .card {
            background: linear-gradient(135deg, rgba(10, 36, 56, 0.95) 0%, rgba(8, 27, 41, 0.98) 100%);
            border-radius: 15px;
            border: 1px solid rgba(0, 238, 255, 0.2);
            overflow: hidden;
        }
        .card-header {
            padding: 18px 20px;
            border-bottom: 1px solid rgba(0, 238, 255, 0.2);
        }
        .card-header h3 { color: #0ef; font-size: 18px; }
        .card-body { padding: 20px; }
        .setting-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 0;
            border-bottom: 1px solid rgba(0, 238, 255, 0.1);
        }
        .setting-item:last-child { border-bottom: none; }
        .setting-info h4 { color: #fff; margin-bottom: 5px; }
        .setting-info p { color: #a0d2db; font-size: 13px; opacity: 0.7; }
        .switch {
            position: relative;
            display: inline-block;
            width: 52px;
            height: 26px;
        }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(255, 255, 255, 0.2);
            transition: 0.3s;
            border-radius: 34px;
        }
        .slider:before {
            position: absolute;
            content: "";
            height: 20px;
            width: 20px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            transition: 0.3s;
            border-radius: 50%;
        }
        input:checked + .slider { background-color: #0ef; }
        input:checked + .slider:before { transform: translateX(26px); }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; color: #a0d2db; margin-bottom: 8px; font-weight: 500; }
        .form-control {
            width: 100%;
            padding: 12px 15px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(0, 238, 255, 0.3);
            border-radius: 10px;
            color: #fff;
            font-size: 14px;
        }
        .form-control:focus { outline: none; border-color: #0ef; }
        .btn-save {
            padding: 12px 25px;
            background: #0ef;
            border: none;
            border-radius: 10px;
            color: #081b29;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            width: 100%;
        }
        .btn-save:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0, 238, 255, 0.3); }
        .danger-zone { border-color: rgba(239, 68, 68, 0.5); }
        .danger-zone .card-header { border-bottom-color: rgba(239, 68, 68, 0.3); }
        .danger-zone h3 { color: #ef4444 !important; }
        .btn-danger {
            background: rgba(239, 68, 68, 0.2);
            border: 1px solid #ef4444;
            color: #ef4444;
            padding: 12px 25px;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            width: 100%;
        }
        .btn-danger:hover { background: #ef4444; color: white; }
        .menu-toggle {
            display: none;
            background: rgba(0, 238, 255, 0.2);
            border: none;
            color: #0ef;
            font-size: 24px;
            padding: 10px;
            border-radius: 8px;
            cursor: pointer;
        }
        @media (max-width: 992px) {
            .sidebar { right: -280px; }
            .main-content { margin-right: 0; }
            .sidebar.mobile-open { right: 0; }
            .menu-toggle { display: block; }
            .settings-grid { grid-template-columns: 1fr; }
        }
        @media (max-width: 576px) {
            .top-header { flex-direction: column; gap: 10px; }
        }
        .success-message {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #10b981;
            color: white;
            padding: 12px 20px;
            border-radius: 10px;
            display: none;
            z-index: 1000;
        }
        .loading-spinner { text-align: center; padding: 20px; color: #a0d2db; }
    </style>
</head>
<body>
    <div class="admin-container">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <img src="https://i.ibb.co/LhY9KjRv/MSB.png" alt="MSB Bank">
                <h3>MSB Bank</h3>
                <p>منصة المشرفين</p>
            </div>
            <div class="sidebar-menu">
                <a href="dashboard.html" class="menu-item">
                    <i class="fas fa-tachometer-alt"></i>
                    <span>لوحة التحكم</span>
                </a>
                <a href="users.html" class="menu-item">
                    <i class="fas fa-users"></i>
                    <span>إدارة المستخدمين</span>
                </a>
                <a href="analytics.html" class="menu-item">
                    <i class="fas fa-chart-line"></i>
                    <span>التحليلات</span>
                </a>
                <a href="settings.html" class="menu-item active">
                    <i class="fas fa-cog"></i>
                    <span>إعدادات النظام</span>
                </a>
            </div>
        </aside>

        <main class="main-content">
            <div class="top-header">
                <button class="menu-toggle" id="menuToggle">
                    <i class="fas fa-bars"></i>
                </button>
                <h1 class="page-title">إعدادات النظام</h1>
                <div class="admin-info">
                    <span class="admin-name" id="adminName">admin@msbbank.com</span>
                    <button class="logout-btn" id="logoutBtn">
                        <i class="fas fa-sign-out-alt"></i> خروج
                    </button>
                </div>
            </div>

            <div id="settingsContainer">
                <div class="loading-spinner">
                    <i class="fas fa-spinner fa-spin"></i> جاري تحميل الإعدادات...
                </div>
            </div>
        </main>
    </div>

    <div id="successMessage" class="success-message">
        <i class="fas fa-check-circle"></i> تم حفظ الإعدادات بنجاح
    </div>

    <script src="admin-auth.js"></script>
    <script src="admin-api.js"></script>
    <script>
        let currentSettings = {};

        async function loadSettings() {
            try {
                const result = await AdminAPI.getSystemSettings();
                if (result.success) {
                    currentSettings = result.settings;
                    renderSettingsForm();
                }
            } catch (error) {
                console.error('Error loading settings:', error);
                document.getElementById('settingsContainer').innerHTML = `
                    <div class="loading-spinner" style="color: #ef4444;">
                        <i class="fas fa-exclamation-triangle"></i> خطأ في تحميل الإعدادات
                    </div>
                `;
            }
        }

        function renderSettingsForm() {
            document.getElementById('settingsContainer').innerHTML = `
                <div class="settings-grid">
                    <!-- إعدادات الأمان -->
                    <div class="card">
                        <div class="card-header">
                            <h3><i class="fas fa-shield-alt"></i> إعدادات الأمان</h3>
                        </div>
                        <div class="card-body">
                            <div class="setting-item">
                                <div class="setting-info">
                                    <h4>المصادقة الثنائية للمشرفين</h4>
                                    <p>طلب رمز تحقق إضافي عند تسجيل دخول المشرفين</p>
                                </div>
                                <label class="switch">
                                    <input type="checkbox" id="twoFactorAdmin" ${currentSettings.twoFactorAdmin ? 'checked' : ''}>
                                    <span class="slider"></span>
                                </label>
                            </div>
                            <div class="setting-item">
                                <div class="setting-info">
                                    <h4>تسجيل جميع عمليات المشرفين</h4>
                                    <p>تسجيل كل عملية يقوم بها المشرف في السجلات</p>
                                </div>
                                <label class="switch">
                                    <input type="checkbox" id="adminLogging" ${currentSettings.adminLogging !== false ? 'checked' : ''}>
                                    <span class="slider"></span>
                                </label>
                            </div>
                            <div class="setting-item">
                                <div class="setting-info">
                                    <h4>انتهاء جلسة المشرف تلقائياً</h4>
                                    <p>تسجيل خروج تلقائي بعد فترة عدم نشاط</p>
                                </div>
                                <label class="switch">
                                    <input type="checkbox" id="autoLogout" ${currentSettings.autoLogout !== false ? 'checked' : ''}>
                                    <span class="slider"></span>
                                </label>
                            </div>
                        </div>
                    </div>

                    <!-- إعدادات المستخدمين -->
                    <div class="card">
                        <div class="card-header">
                            <h3><i class="fas fa-users"></i> إعدادات المستخدمين</h3>
                        </div>
                        <div class="card-body">
                            <div class="setting-item">
                                <div class="setting-info">
                                    <h4>الموافقة التلقائية على الحسابات</h4>
                                    <p>تفعيل الحسابات الجديدة تلقائياً بدون موافقة المشرف</p>
                                </div>
                                <label class="switch">
                                    <input type="checkbox" id="autoApprove" ${currentSettings.autoApprove ? 'checked' : ''}>
                                    <span class="slider"></span>
                                </label>
                            </div>
                            <div class="setting-item">
                                <div class="setting-info">
                                    <h4>الحد الأدنى للإيداع (ج.م)</h4>
                                    <p>الحد الأدنى لفتح حساب جديد</p>
                                </div>
                                <input type="number" id="minDeposit" class="form-control" style="width: 120px;" value="${currentSettings.minDeposit || 1000}">
                            </div>
                            <div class="setting-item">
                                <div class="setting-info">
                                    <h4>الحد اليومي للتحويل (ج.م)</h4>
                                    <p>الحد الأقصى للتحويل اليومي للمستخدم العادي</p>
                                </div>
                                <input type="number" id="dailyLimit" class="form-control" style="width: 120px;" value="${currentSettings.dailyLimit || 50000}">
                            </div>
                        </div>
                    </div>

                    <!-- إعدادات طرق الدفع -->
                    <div class="card">
                        <div class="card-header">
                            <h3><i class="fas fa-credit-card"></i> طرق الدفع</h3>
                        </div>
                        <div class="card-body">
                            <div class="setting-item">
                                <div class="setting-info">
                                    <h4>التحويل البنكي</h4>
                                    <p>تفعيل التحويلات البنكية بين الحسابات</p>
                                </div>
                                <label class="switch">
                                    <input type="checkbox" id="bankTransfer" ${currentSettings.bankTransfer !== false ? 'checked' : ''}>
                                    <span class="slider"></span>
                                </label>
                            </div>
                            <div class="setting-item">
                                <div class="setting-info">
                                    <h4>المحفظة الإلكترونية</h4>
                                    <p>تفعيل خدمة المحفظة الإلكترونية للمستخدمين</p>
                                </div>
                                <label class="switch">
                                    <input type="checkbox" id="eWallet" ${currentSettings.eWallet !== false ? 'checked' : ''}>
                                    <span class="slider"></span>
                                </label>
                            </div>
                            <div class="setting-item">
                                <div class="setting-info">
                                    <h4>الاستثمارات</h4>
                                    <p>تفعيل خدمات الاستثمار للعملاء</p>
                                </div>
                                <label class="switch">
                                    <input type="checkbox" id="investments" ${currentSettings.investments !== false ? 'checked' : ''}>
                                    <span class="slider"></span>
                                </label>
                            </div>
                        </div>
                    </div>

                    <!-- إعدادات الإشعارات -->
                    <div class="card">
                        <div class="card-header">
                            <h3><i class="fas fa-bell"></i> إعدادات الإشعارات</h3>
                        </div>
                        <div class="card-body">
                            <div class="setting-item">
                                <div class="setting-info">
                                    <h4>إشعارات المستخدمين الجدد</h4>
                                    <p>إرسال إشعار عند تسجيل مستخدم جديد</p>
                                </div>
                                <label class="switch">
                                    <input type="checkbox" id="newUserNotify" ${currentSettings.newUserNotify !== false ? 'checked' : ''}>
                                    <span class="slider"></span>
                                </label>
                            </div>
                            <div class="setting-item">
                                <div class="setting-info">
                                    <h4>إشعارات المعاملات الكبيرة</h4>
                                    <p>إشعار عند حدوث معاملة أكبر من 100,000 ج.م</p>
                                </div>
                                <label class="switch">
                                    <input type="checkbox" id="largeTransNotify" ${currentSettings.largeTransNotify !== false ? 'checked' : ''}>
                                    <span class="slider"></span>
                                </label>
                            </div>
                            <div class="setting-item">
                                <div class="setting-info">
                                    <h4>إشعارات أمنية للمشرفين</h4>
                                    <p>إشعار عند محاولات دخول فاشلة</p>
                                </div>
                                <label class="switch">
                                    <input type="checkbox" id="securityNotify" ${currentSettings.securityNotify !== false ? 'checked' : ''}>
                                    <span class="slider"></span>
                                </label>
                            </div>
                        </div>
                    </div>

                    <!-- منطقة الخطر -->
                    <div class="card danger-zone">
                        <div class="card-header">
                            <h3><i class="fas fa-exclamation-triangle"></i> منطقة الخطر</h3>
                        </div>
                        <div class="card-body">
                            <div class="setting-item">
                                <div class="setting-info">
                                    <h4>حفظ الإعدادات</h4>
                                    <p>حفظ جميع الإعدادات الحالية</p>
                                </div>
                                <button class="btn-save" onclick="saveSettings()" style="width: auto; padding: 8px 20px;">
                                    <i class="fas fa-save"></i> حفظ
                                </button>
                            </div>
                            <div class="setting-item">
                                <div class="setting-info">
                                    <h4>إعادة تعيين الإعدادات</h4>
                                    <p>إعادة تعيين جميع الإعدادات إلى الوضع الافتراضي</p>
                                </div>
                                <button class="btn-danger" onclick="resetSettings()" style="width: auto; padding: 8px 20px;">
                                    <i class="fas fa-undo-alt"></i> إعادة تعيين
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        async function saveSettings() {
            const settings = {
                twoFactorAdmin: document.getElementById('twoFactorAdmin')?.checked || false,
                adminLogging: document.getElementById('adminLogging')?.checked || true,
                autoLogout: document.getElementById('autoLogout')?.checked || true,
                autoApprove: document.getElementById('autoApprove')?.checked || false,
                minDeposit: parseInt(document.getElementById('minDeposit')?.value) || 1000,
                dailyLimit: parseInt(document.getElementById('dailyLimit')?.value) || 50000,
                bankTransfer: document.getElementById('bankTransfer')?.checked || true,
                eWallet: document.getElementById('eWallet')?.checked || true,
                investments: document.getElementById('investments')?.checked || true,
                newUserNotify: document.getElementById('newUserNotify')?.checked || true,
                largeTransNotify: document.getElementById('largeTransNotify')?.checked || true,
                securityNotify: document.getElementById('securityNotify')?.checked || true
            };
            
            try {
                const result = await AdminAPI.updateSystemSettings(settings);
                if (result.success) {
                    showSuccessMessage();
                }
            } catch (error) {
                alert('❌ ' + error.message);
            }
        }

        async function resetSettings() {
            if (!confirm('⚠️ تحذير: هذا الإجراء سيعيد تعيين جميع الإعدادات إلى الوضع الافتراضي. هل أنت متأكد?')) return;
            
            const defaultSettings = {
                twoFactorAdmin: false,
                adminLogging: true,
                autoLogout: true,
                autoApprove: false,
                minDeposit: 1000,
                dailyLimit: 50000,
                bankTransfer: true,
                eWallet: true,
                investments: true,
                newUserNotify: true,
                largeTransNotify: true,
                securityNotify: true
            };
            
            try {
                const result = await AdminAPI.updateSystemSettings(defaultSettings);
                if (result.success) {
                    currentSettings = defaultSettings;
                    renderSettingsForm();
                    showSuccessMessage();
                }
            } catch (error) {
                alert('❌ ' + error.message);
            }
        }

        function showSuccessMessage() {
            const msg = document.getElementById('successMessage');
            msg.style.display = 'block';
            setTimeout(() => {
                msg.style.display = 'none';
            }, 2000);
        }

        // إعدادات الصفحة
        document.getElementById('menuToggle')?.addEventListener('click', function() {
            document.getElementById('sidebar').classList.toggle('mobile-open');
        });

        document.getElementById('logoutBtn')?.addEventListener('click', function() {
            adminLogout();
        });

        document.getElementById('adminName').textContent = localStorage.getItem('adminEmail') || 'admin@msbbank.com';
        
        // تحميل البيانات
        loadSettings();

        window.saveSettings = saveSettings;
        window.resetSettings = resetSettings;
    </script>
</body>
</html>
